<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>労務費台帳</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Yu Gothic UI','Meiryo',sans-serif;background:#f5f5f4;color:#1f2933;min-height:100vh}
button,input{font:inherit}
.app-header{background:#155e75;color:#fff;padding:0 24px;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.header-inner{max-width:1440px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:24px;min-height:76px}
.brand{display:flex;flex-direction:column;gap:4px;min-width:0}
.brand-title{font-size:22px;font-weight:800;line-height:1.2}
.brand-subtitle{font-size:13px;opacity:.86;white-space:nowrap}
.sync-box{text-align:right;font-size:12px;line-height:1.6;white-space:nowrap;opacity:.9}
.app-main{max-width:1440px;margin:0 auto;padding:24px}
.summary-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
.summary-tile{background:#fff;border:1px solid #e4e7eb;border-radius:8px;padding:14px 16px;min-width:0}
.summary-label{font-size:12px;color:#66788a;font-weight:700;margin-bottom:6px}
.summary-value{font-size:24px;font-weight:850;line-height:1;color:#102a43;font-variant-numeric:tabular-nums}
.summary-total .summary-value{color:#0f766e}
.workspace{background:#fff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden}
.toolbar{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;padding:14px 16px;border-bottom:1px solid #e4e7eb;flex-wrap:wrap}
.toolbar-left{display:flex;gap:10px;align-items:center;flex-wrap:wrap;min-width:0}
.tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab{border:1px solid #bcccdc;background:#fff;color:#334e68;border-radius:6px;padding:9px 16px;font-size:14px;font-weight:800;cursor:pointer}
.tab.active{background:#155e75;border-color:#155e75;color:#fff}
.search-box{display:flex;align-items:center;border:1px solid #bcccdc;border-radius:6px;background:#fff;min-width:300px;max-width:460px;flex:1}
.search-box:focus-within{border-color:#0e7490;box-shadow:0 0 0 3px rgba(14,116,144,.14)}
.search-input{border:none;outline:none;background:transparent;padding:9px 11px;font-size:14px;width:100%}
.search-clear{border:none;background:transparent;color:#66788a;cursor:pointer;padding:0 10px;font-weight:800}
.toolbar-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.file-label{position:relative;overflow:hidden}
.file-label input{position:absolute;inset:0;opacity:0;cursor:pointer}
.btn{border:none;border-radius:6px;padding:9px 14px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap}
.btn-primary{background:#0e7490;color:#fff}
.btn-secondary{background:#fff;color:#243b53;border:1px solid #bcccdc}
.btn:disabled{opacity:.45;cursor:not-allowed}
.notice{margin:14px 16px 0;background:#ecfeff;color:#164e63;border:1px solid #a5f3fc;border-radius:6px;padding:10px 12px;font-size:13px;font-weight:650}
.notice.warn{background:#fff7ed;color:#7c2d12;border-color:#fed7aa}
.result-line{padding:12px 16px;color:#66788a;font-size:13px;border-bottom:1px solid #edf2f7}
.table-wrap{overflow:auto}
.ledger-table{width:100%;border-collapse:collapse;min-width:760px;font-size:13px}
.ledger-table th{background:#f8fafc;color:#52606d;text-align:left;font-weight:850;padding:11px 14px;border-bottom:1px solid #d9e2ec;position:sticky;top:0;z-index:1}
.ledger-table td{padding:11px 14px;border-bottom:1px solid #edf2f7;vertical-align:middle}
.ledger-table tr:hover td{background:#f8fafc}
.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:800}
.muted{color:#829ab1}
.status-pill{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:850;white-space:nowrap}
.status-active{background:#e0f2fe;color:#075985}
.status-completed{background:#dcfce7;color:#166534}
.status-added{background:#dcfce7;color:#166534}
.status-none{background:#f1f5f9;color:#475569}
.empty-state{padding:58px 20px;text-align:center;color:#829ab1;font-size:15px}
.import-log{margin:14px 16px 16px;background:#f8fafc;border:1px solid #e4e7eb;border-radius:6px;padding:11px 12px;color:#52606d;font-size:13px;line-height:1.7;max-height:150px;overflow:auto}
@media(max-width:900px){
  .app-header{padding:0 16px}
  .header-inner{align-items:flex-start;flex-direction:column;padding:14px 0;gap:8px}
  .sync-box{text-align:left}
  .app-main{padding:16px}
  .summary-grid{grid-template-columns:repeat(2,1fr)}
  .summary-total{grid-column:1/-1}
  .toolbar,.toolbar-left,.toolbar-actions,.search-box{width:100%;max-width:none}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
const STORAGE_KEY = 'labor_cost_dashboard_local'
const API_URL = '/api/data'
const PROJECT_NAMES_API_URL = '/api/project-names'

const state = {
  projects: [],
  monthlyCosts: [],
  completedCosts: [],
  projectNames: {},
  lastImportedMonth: null,
  lastMonthlyUpdatedNumbers: [],
  view: 'active',
  search: '',
  loading: true,
  loadingNames: true,
  saving: false,
  syncText: '読み込み中',
  log: [],
}

function parseCsv(text) {
  const rows = []
  let row = []
  let cell = ''
  let quoted = false
  const src = text.replace(/^\uFEFF/, '')
  for (let i = 0; i < src.length; i++) {
    const ch = src[i]
    const next = src[i + 1]
    if (quoted) {
      if (ch === '"' && next === '"') {
        cell += '"'
        i++
      } else if (ch === '"') {
        quoted = false
      } else {
        cell += ch
      }
    } else if (ch === '"') {
      quoted = true
    } else if (ch === ',') {
      row.push(cell)
      cell = ''
    } else if (ch === '\n') {
      row.push(cell)
      rows.push(row)
      row = []
      cell = ''
    } else if (ch !== '\r') {
      cell += ch
    }
  }
  row.push(cell)
  rows.push(row)
  return rows.filter(r => r.some(v => String(v).trim() !== ''))
}

async function readFile(file, markers = []) {
  const buffer = await file.arrayBuffer()
  const labels = ['utf-8', 'shift_jis']
  const candidates = labels.map(label => {
    try {
      const text = new TextDecoder(label).decode(buffer)
      const replacements = (text.match(/\uFFFD/g) || []).length
      const hits = markers.filter(marker => text.includes(marker)).length
      return { text, score: replacements * 10 - hits * 100 }
    } catch (error) {
      return null
    }
  }).filter(Boolean)
  candidates.sort((a, b) => a.score - b.score)
  return candidates[0]?.text || ''
}

function normalizeNumber(value) {
  return String(value || '').trim()
}

function normalizeHeader(value) {
  return String(value || '').trim().toLowerCase().replace(/[\s_-]+/g, '')
}

function findColumn(header, names) {
  const normalized = header.map(normalizeHeader)
  return names.map(normalizeHeader).reduce((found, name) => (
    found >= 0 ? found : normalized.indexOf(name)
  ), -1)
}

function parseAmount(value) {
  const cleaned = String(value || '').replace(/[,\s円]/g, '').trim()
  if (!cleaned || cleaned === '-' || cleaned === '－') return 0
  const n = Number(cleaned)
  return Number.isFinite(n) ? n : 0
}

function parseMonthFromName(name) {
  const match = String(name).match(/(20\d{2})[._-](\d{1,2})\.csv$/i)
  if (!match) return null
  return `${match[1]}-${match[2].padStart(2, '0')}`
}

function monthLabel(month) {
  if (!month) return '-'
  const [year, m] = month.split('-')
  return `${year}年${Number(m)}月`
}

function formatMoney(value) {
  return Math.round(value || 0).toLocaleString('ja-JP')
}

function addLog(message) {
  const time = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })
  state.log = [`${time} ${message}`, ...state.log].slice(0, 8)
}

function getActiveNumbers() {
  return new Set(state.projects.map(project => project.number))
}

function getDisplayName(item) {
  const fetchedName = state.projectNames[item.number]
  if (fetchedName && fetchedName !== item.number) return fetchedName
  if (item.name && item.name !== item.number) return item.name
  return item.number
}

function getVisibleCompletedCosts() {
  const activeNumbers = getActiveNumbers()
  return state.completedCosts.filter(item => !activeNumbers.has(item.number))
}

function getDuplicateCompletedCount() {
  const activeNumbers = getActiveNumbers()
  return state.completedCosts.filter(item => activeNumbers.has(item.number)).length
}

function getSortedMonths() {
  return [...state.monthlyCosts].sort((a, b) => a.month.localeCompare(b.month))
}

function getProjectMonthlyAmount(number, month) {
  const target = state.monthlyCosts.find(item => item.month === month)
  return Number(target?.costsByNumber?.[number] || 0)
}

function getActiveLaborTotal(number) {
  return getSortedMonths().reduce((sum, item) => sum + Number(item.costsByNumber?.[number] || 0), 0)
}

function isUpdatedInLastImport(number) {
  return state.lastMonthlyUpdatedNumbers.includes(number)
}

function getSummary() {
  const completed = getVisibleCompletedCosts()
  const activeTotal = state.projects.reduce((sum, project) => sum + getActiveLaborTotal(project.number), 0)
  const completedTotal = completed.reduce((sum, item) => sum + item.laborCost, 0)
  return [
    ['進行中件数', state.projects.length],
    ['完了済み件数', completed.length],
    ['進行中労務費', `${formatMoney(activeTotal)}円`],
    ['完了済み労務費', `${formatMoney(completedTotal)}円`],
    ['全体労務費', `${formatMoney(activeTotal + completedTotal)}円`, 'summary-total'],
  ]
}

function getFilteredActiveProjects() {
  const q = state.search.trim().toLowerCase()
  return [...state.projects]
    .filter(project => {
      const name = getDisplayName(project).toLowerCase()
      return !q || project.number.toLowerCase().includes(q) || name.includes(q)
    })
    .sort((a, b) => a.number.localeCompare(b.number, 'ja'))
}

function getFilteredCompletedCosts() {
  const q = state.search.trim().toLowerCase()
  return getVisibleCompletedCosts()
    .filter(item => {
      const name = getDisplayName(item).toLowerCase()
      return !q || item.number.toLowerCase().includes(q) || name.includes(q)
    })
    .sort((a, b) => a.number.localeCompare(b.number, 'ja'))
}

function buildPayload() {
  return {
    projects: state.projects,
    monthlyCosts: state.monthlyCosts,
    completedCosts: state.completedCosts,
    lastImportedMonth: state.lastImportedMonth,
    lastMonthlyUpdatedNumbers: state.lastMonthlyUpdatedNumbers,
    updatedAt: new Date().toISOString(),
  }
}

function sanitizeData(data) {
  const projects = Array.isArray(data.projects) ? data.projects : []
  const monthlyCosts = Array.isArray(data.monthlyCosts) ? data.monthlyCosts : []
  const completedCosts = Array.isArray(data.completedCosts) ? data.completedCosts : []
  return {
    projects: projects
      .map(project => ({
        number: normalizeNumber(project.number),
        name: String(project.name || '').trim(),
      }))
      .filter(project => project.number),
    monthlyCosts: monthlyCosts
      .map(item => ({ month: String(item.month || ''), costsByNumber: item.costsByNumber || {} }))
      .filter(item => /^\d{4}-\d{2}$/.test(item.month)),
    completedCosts: completedCosts
      .map(item => ({
        number: normalizeNumber(item.number),
        name: String(item.name || '').trim(),
        laborCost: parseAmount(item.laborCost ?? item.LaborCost),
      }))
      .filter(item => item.number),
    lastImportedMonth: /^\d{4}-\d{2}$/.test(String(data.lastImportedMonth || '')) ? data.lastImportedMonth : null,
    lastMonthlyUpdatedNumbers: Array.isArray(data.lastMonthlyUpdatedNumbers)
      ? data.lastMonthlyUpdatedNumbers.map(normalizeNumber).filter(Boolean)
      : [],
    updatedAt: data.updatedAt || null,
  }
}

function loadLocalData() {
  try {
    const local = localStorage.getItem(STORAGE_KEY)
    return local ? sanitizeData(JSON.parse(local)) : null
  } catch (error) {
    return null
  }
}

function applyData(data) {
  state.projects = data.projects
  state.monthlyCosts = data.monthlyCosts
  state.completedCosts = data.completedCosts
  state.lastImportedMonth = data.lastImportedMonth
  state.lastMonthlyUpdatedNumbers = data.lastMonthlyUpdatedNumbers
}

function saveLocalData() {
  const payload = buildPayload()
  localStorage.setItem(STORAGE_KEY, JSON.stringify(payload))
  state.syncText = `ローカル自動保存 ${new Date(payload.updatedAt).toLocaleString('ja-JP')}`
}

async function loadProjectNames() {
  state.loadingNames = true
  try {
    const response = await fetch(`${PROJECT_NAMES_API_URL}?${Date.now()}`)
    const result = await response.json().catch(() => ({}))
    if (!response.ok) throw new Error(result.error || 'project names unavailable')
    const rows = Array.isArray(result.projectNames) ? result.projectNames : []
    state.projectNames = Object.fromEntries(
      rows
        .map(item => [normalizeNumber(item.number), String(item.name || '').trim()])
        .filter(([number, name]) => number && name)
    )
    addLog(`業務名を${Object.keys(state.projectNames).length}件読み込みました`)
  } catch (error) {
    state.projectNames = {}
    addLog(`業務名の読み込みに失敗しました: ${error.message}`)
  } finally {
    state.loadingNames = false
  }
}

async function loadData() {
  state.loading = true
  render()
  try {
    const response = await fetch(`${API_URL}?${Date.now()}`)
    if (!response.ok) throw new Error('remote unavailable')
    const data = sanitizeData(await response.json())
    const localData = !data.projects.length && !data.monthlyCosts.length && !data.completedCosts.length ? loadLocalData() : null
    applyData(localData || data)
    state.syncText = localData
      ? 'ローカルデータ'
      : data.updatedAt ? `保存済み ${new Date(data.updatedAt).toLocaleString('ja-JP')}` : '保存データなし'
  } catch (error) {
    const data = loadLocalData()
    if (data) {
      applyData(data)
      state.syncText = 'ローカルデータ'
    } else {
      state.syncText = '保存データなし'
    }
  } finally {
    state.loading = false
    render()
  }
}

async function saveData() {
  state.saving = true
  render()
  const payload = buildPayload()
  localStorage.setItem(STORAGE_KEY, JSON.stringify(payload))
  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    })
    if (!response.ok) throw new Error(await response.text())
    const result = await response.json()
    applyData(sanitizeData(result.data || payload))
    state.syncText = `保存済み ${new Date(result.data?.updatedAt || Date.now()).toLocaleString('ja-JP')}`
    addLog('Neonに保存しました')
  } catch (error) {
    state.syncText = 'ローカル保存'
    addLog('Neon保存に失敗したためローカルに保存しました')
  } finally {
    state.saving = false
    render()
  }
}

async function importProjects(event) {
  const file = event.target.files?.[0]
  event.target.value = ''
  if (!file) return
  try {
    const rows = parseCsv(await readFile(file, ['number']))
    const headerIndex = rows.findIndex(row => row.map(normalizeHeader).includes('number'))
    if (headerIndex < 0) throw new Error('number列が見つかりません')
    const header = rows[headerIndex]
    const numberIndex = findColumn(header, ['number'])
    const nameIndex = findColumn(header, ['name'])
    if (numberIndex < 0) throw new Error('number列が必要です')
    const seen = new Set()
    state.projects = rows.slice(headerIndex + 1)
      .map(row => ({
        number: normalizeNumber(row[numberIndex]),
        name: nameIndex >= 0 ? String(row[nameIndex] || '').trim() : '',
      }))
      .filter(project => project.number)
      .filter(project => {
        if (seen.has(project.number)) return false
        seen.add(project.number)
        return true
      })
    saveLocalData()
    addLog(`進行中業務を${state.projects.length}件読み込みました`)
    const duplicateCount = getDuplicateCompletedCount()
    if (duplicateCount) addLog(`完了済みと重複する${duplicateCount}件は進行中を優先します`)
    render()
  } catch (error) {
    addLog(`対象業務CSVの読込に失敗しました: ${error.message}`)
    render()
  }
}

async function importCompletedCosts(event) {
  const file = event.target.files?.[0]
  event.target.value = ''
  if (!file) return
  try {
    const rows = parseCsv(await readFile(file, ['number', 'LaborCost']))
    const headerIndex = rows.findIndex(row => row.map(normalizeHeader).includes('number'))
    if (headerIndex < 0) throw new Error('number列が見つかりません')
    const header = rows[headerIndex]
    const numberIndex = findColumn(header, ['number'])
    const nameIndex = findColumn(header, ['name'])
    const laborIndex = findColumn(header, ['LaborCost', 'labor cost'])
    if (numberIndex < 0 || laborIndex < 0) throw new Error('number,LaborCost列が必要です')
    const seen = new Set()
    state.completedCosts = rows.slice(headerIndex + 1)
      .map(row => ({
        number: normalizeNumber(row[numberIndex]),
        name: nameIndex >= 0 ? String(row[nameIndex] || '').trim() : '',
        laborCost: parseAmount(row[laborIndex]),
      }))
      .filter(item => item.number)
      .filter(item => {
        if (seen.has(item.number)) return false
        seen.add(item.number)
        return true
      })
    saveLocalData()
    addLog(`完了済み業務を${state.completedCosts.length}件読み込みました`)
    const duplicateCount = getDuplicateCompletedCount()
    if (duplicateCount) addLog(`進行中と重複する${duplicateCount}件は完了済み一覧から除外します`)
    render()
  } catch (error) {
    addLog(`完了済みCSVの読込に失敗しました: ${error.message}`)
    render()
  }
}

async function importMonthly(event) {
  const files = [...(event.target.files || [])]
  event.target.value = ''
  if (!files.length) return
  let latestImported = null
  let latestUpdatedNumbers = []
  for (const file of files) {
    try {
      const month = parseMonthFromName(file.name)
      if (!month) throw new Error('ファイル名はYYYY.MM.csvにしてください')
      const rows = parseCsv(await readFile(file, ['工番', '建コン合計']))
      const headerIndex = rows.findIndex(row => {
        const cells = row.map(cell => cell.trim())
        return cells.includes('工番') && cells.includes('建コン合計')
      })
      if (headerIndex < 0) throw new Error('工番・建コン合計の列が見つかりません')
      const header = rows[headerIndex].map(cell => cell.trim())
      const numberIndex = header.indexOf('工番')
      const totalIndex = header.indexOf('建コン合計')
      const targetNumbers = new Set(state.projects.map(project => project.number))
      const costsByNumber = {}
      rows.slice(headerIndex + 1).forEach(row => {
        const number = normalizeNumber(row[numberIndex])
        if (!number || !targetNumbers.has(number)) return
        costsByNumber[number] = parseAmount(row[totalIndex])
      })
      const item = { month, costsByNumber }
      const existingIndex = state.monthlyCosts.findIndex(existing => existing.month === month)
      if (existingIndex >= 0) state.monthlyCosts.splice(existingIndex, 1, item)
      else state.monthlyCosts.push(item)
      state.monthlyCosts.sort((a, b) => a.month.localeCompare(b.month))
      latestImported = month
      latestUpdatedNumbers = Object.entries(costsByNumber)
        .filter(([, amount]) => Number(amount) > 0)
        .map(([number]) => number)
      addLog(`${monthLabel(month)}を読み込みました（追加あり ${latestUpdatedNumbers.length}件 / 対象 ${Object.keys(costsByNumber).length}件）`)
    } catch (error) {
      addLog(`${file.name}: ${error.message}`)
    }
  }
  if (latestImported) {
    state.lastImportedMonth = latestImported
    state.lastMonthlyUpdatedNumbers = latestUpdatedNumbers
  }
  saveLocalData()
  render()
}

function csvCell(value) {
  const text = value === null || value === undefined ? '' : String(value)
  return `"${text.replace(/"/g, '""')}"`
}

function downloadTextFile(filename, text, type = 'text/csv;charset=utf-8') {
  const blob = new Blob([text], { type })
  const url = URL.createObjectURL(blob)
  const link = document.createElement('a')
  link.href = url
  link.download = filename
  document.body.appendChild(link)
  link.click()
  link.remove()
  URL.revokeObjectURL(url)
}

function exportUnifiedCsv() {
  const activeRows = state.projects.map(project => [
    project.number,
    getDisplayName(project),
    'active',
    getActiveLaborTotal(project.number),
  ])
  const completedRows = getVisibleCompletedCosts().map(item => [
    item.number,
    getDisplayName(item),
    'completed',
    item.laborCost,
  ])
  const rows = [['number', 'name', 'status', 'laborCost'], ...activeRows, ...completedRows]
  const csv = '\uFEFF' + rows.map(row => row.map(csvCell).join(',')).join('\r\n')
  const date = new Date().toISOString().slice(0, 10).replace(/-/g, '')
  downloadTextFile(`labor-cost-source-${date}.csv`, csv)
  addLog(`統合CSVを${activeRows.length + completedRows.length}件出力しました`)
  render()
}

function render() {
  const summary = getSummary()
  const rows = state.view === 'active' ? getFilteredActiveProjects() : getFilteredCompletedCosts()
  const duplicateCount = getDuplicateCompletedCount()
  document.getElementById('app').innerHTML = `
    <header class="app-header">
      <div class="header-inner">
        <div class="brand">
          <div class="brand-title">労務費台帳</div>
          <div class="brand-subtitle">他アプリが読み込む労務費元データを管理</div>
        </div>
        <div class="sync-box">
          <div>最終取込月: ${monthLabel(state.lastImportedMonth)}</div>
          <div>${escapeHtml(state.syncText)} / 業務名 ${getProjectNameStatusText()}</div>
        </div>
      </div>
    </header>
    <main class="app-main">
      <section class="summary-grid">
        ${summary.map(([label, value, className]) => `
          <div class="summary-tile ${className || ''}">
            <div class="summary-label">${label}</div>
            <div class="summary-value">${value}</div>
          </div>
        `).join('')}
      </section>
      <section class="workspace">
        <div class="toolbar">
          <div class="toolbar-left">
            <div class="tabs">
              ${tabButton('active', '進行中業務')}
              ${tabButton('completed', '完了済み業務')}
            </div>
            <div class="search-box">
              <input id="search-input" class="search-input" type="text" placeholder="業務番号・業務名で検索" value="${escapeAttr(state.search)}" />
              ${state.search ? '<button id="search-clear" class="search-clear">×</button>' : ''}
            </div>
          </div>
          <div class="toolbar-actions">
            <label class="btn btn-secondary file-label">対象業務CSV<input id="projects-input" type="file" accept=".csv" /></label>
            <label class="btn btn-secondary file-label">月次CSV<input id="monthly-input" type="file" accept=".csv" multiple /></label>
            <label class="btn btn-secondary file-label">完了済みCSV<input id="completed-input" type="file" accept=".csv" /></label>
            <button id="export-btn" class="btn btn-secondary" ${state.projects.length || getVisibleCompletedCosts().length ? '' : 'disabled'}>統合CSV出力</button>
            <button id="save-btn" class="btn btn-primary" ${state.saving ? 'disabled' : ''}>${state.saving ? '保存中' : '保存'}</button>
          </div>
        </div>
        ${renderNotice(duplicateCount)}
        <div class="result-line">${rows.length}件 表示中</div>
        ${state.view === 'active' ? renderActiveTable(rows) : renderCompletedTable(rows)}
        ${state.log.length ? `<div class="import-log">${state.log.map(escapeHtml).join('<br>')}</div>` : ''}
      </section>
    </main>
  `
  bindEvents()
}

function renderNotice(duplicateCount) {
  if (!state.loadingNames && Object.keys(state.projectNames).length === 0) {
    return '<div class="notice warn">業務名を取得できていません。業務番号を仮の表示名として表示しています。</div>'
  }
  if (state.view === 'active') {
    if (!state.projects.length) return '<div class="notice">対象業務CSVを読み込むと、進行中業務の台帳が表示されます。</div>'
    if (!state.monthlyCosts.length) return '<div class="notice">月次CSVを読み込むと、累計労務費と月次追加の有無が表示されます。</div>'
    return `<div class="notice">最後に取り込んだ月次CSV: ${monthLabel(state.lastImportedMonth)}。月次追加は次の取込までこの結果を表示します。</div>`
  }
  if (!state.completedCosts.length) return '<div class="notice">完了済みCSVは number,LaborCost の2列で読み込めます。業務名は元サイトから自動補完します。</div>'
  if (duplicateCount) return `<div class="notice warn">進行中と重複する完了済み業務 ${duplicateCount}件は、進行中を優先して除外しています。</div>`
  return '<div class="notice">完了済み業務は固定労務費として管理し、月次追加の対象外です。</div>'
}

function getProjectNameStatusText() {
  if (state.loadingNames) return '読込中'
  const count = Object.keys(state.projectNames).length
  return count ? `${count}件` : '未取得'
}

function tabButton(value, label) {
  return `<button class="tab ${state.view === value ? 'active' : ''}" data-view="${value}">${label}</button>`
}

function renderActiveTable(projects) {
  if (state.loading) return '<div class="empty-state">データを読み込んでいます...</div>'
  if (!projects.length) return '<div class="empty-state">表示できる進行中業務がありません</div>'
  return `
    <div class="table-wrap">
      <table class="ledger-table">
        <thead>
          <tr>
            <th>業務番号</th>
            <th>業務名</th>
            <th class="num">累計労務費</th>
            <th>月次追加</th>
            <th>最終取込月</th>
          </tr>
        </thead>
        <tbody>
          ${projects.map(project => {
            const updated = state.lastImportedMonth ? isUpdatedInLastImport(project.number) : null
            const latestAmount = state.lastImportedMonth ? getProjectMonthlyAmount(project.number, state.lastImportedMonth) : 0
            return `
              <tr>
                <td><strong>${escapeHtml(project.number)}</strong></td>
                <td>${escapeHtml(getDisplayName(project))}</td>
                <td class="num">${formatMoney(getActiveLaborTotal(project.number))}円</td>
                <td>${renderMonthlyStatus(updated, latestAmount)}</td>
                <td>${monthLabel(state.lastImportedMonth)}</td>
              </tr>
            `
          }).join('')}
        </tbody>
      </table>
    </div>
  `
}

function renderMonthlyStatus(updated, amount) {
  if (updated === null) return '<span class="status-pill status-none">未取込</span>'
  if (updated) return `<span class="status-pill status-added">追加あり ${formatMoney(amount)}円</span>`
  return '<span class="status-pill status-none">追加なし</span>'
}

function renderCompletedTable(items) {
  if (state.loading) return '<div class="empty-state">データを読み込んでいます...</div>'
  if (!items.length) return '<div class="empty-state">表示できる完了済み業務がありません</div>'
  return `
    <div class="table-wrap">
      <table class="ledger-table">
        <thead>
          <tr>
            <th>業務番号</th>
            <th>業務名</th>
            <th class="num">固定労務費</th>
            <th>状態</th>
          </tr>
        </thead>
        <tbody>
          ${items.map(item => `
            <tr>
              <td><strong>${escapeHtml(item.number)}</strong></td>
              <td>${escapeHtml(getDisplayName(item))}</td>
              <td class="num">${formatMoney(item.laborCost)}円</td>
              <td><span class="status-pill status-completed">完了済み・固定</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `
}

function bindEvents() {
  document.querySelectorAll('[data-view]').forEach(button => {
    button.addEventListener('click', () => {
      state.view = button.dataset.view
      render()
    })
  })
  document.getElementById('search-input')?.addEventListener('input', event => {
    state.search = event.target.value
    render()
  })
  document.getElementById('search-clear')?.addEventListener('click', () => {
    state.search = ''
    render()
  })
  document.getElementById('projects-input')?.addEventListener('change', importProjects)
  document.getElementById('monthly-input')?.addEventListener('change', importMonthly)
  document.getElementById('completed-input')?.addEventListener('change', importCompletedCosts)
  document.getElementById('export-btn')?.addEventListener('click', exportUnifiedCsv)
  document.getElementById('save-btn')?.addEventListener('click', saveData)
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  }[ch]))
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/`/g, '&#96;')
}

loadProjectNames().finally(loadData)
</script>
</body>
</html>
