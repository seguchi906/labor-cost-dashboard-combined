<!DOCTYPE html>

<title>技術部 労務費管理</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Yu Gothic UI','Meiryo',sans-serif;background:#f3f2f1;color:#201f1e;min-height:100vh}
button,input{font:inherit}
.app-header{background:#0078d4;color:#fff;padding:0 24px;box-shadow:0 2px 6px rgba(0,0,0,.22);position:sticky;top:0;z-index:50}

.header-title-group{display:flex;align-items:center;gap:12px;min-width:0}
.header-icon{width:30px;height:30px;border-radius:7px;background:#fff;display:grid;grid-template-columns:repeat(3,1fr);align-items:end;gap:3px;padding:5px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}

.header-icon span:nth-child(2){height:20px;background:#d83b96}

.header-date{text-align:right;white-space:nowrap}

.file-label input{position:absolute;inset:0;opacity:0;cursor:pointer}
.btn{border-radius:5px;border:none;padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s,box-shadow .15s,transform .1s;white-space:nowrap}

.notice{background:#fff4ce;color:#5d4500;border:1px solid #f1d579;border-radius:6px;padding:10px 14px;font-size:13px;margin-bottom:16px}
.section-group{margin-bottom:34px}
.section-title{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:16px;font-weight:800}
.section-count{font-size:13px;font-weight:400;color:#605e5c}
.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:13px}
.project-card{background:#fff;border-radius:8px;padding:16px 18px;border:2px solid transparent;box-shadow:0 1px 4px rgba(0,0,0,.08);cursor:pointer;transition:box-shadow .15s,border-color .15s,transform .1s;min-height:176px;display:flex;flex-direction:column;gap:8px}
.project-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.14);border-color:#0078d4;transform:translateY(-1px)}
.card-header{display:flex;justify-content:space-between;gap:10px;align-items:center}

.money-value{font-size:24px;font-weight:800;color:#0078d4;letter-spacing:0}
.money-unit{font-size:12px;color:#605e5c;font-weight:700}
.labor-rate{font-size:13px;color:#605e5c;font-weight:800;white-space:nowrap}
.budget-inline{font-size:12px;color:#605e5c;font-weight:800}

.money-right{display:flex;flex-direction:column;gap:4px;text-align:right;min-width:132px}
.contract-line{font-size:12px;color:#605e5c;font-weight:700}
.contract-line strong{color:#201f1e;font-variant-numeric:tabular-nums}
.monthly-bar{height:8px;background:#edebe9;border-radius:4px;overflow:hidden;margin-top:3px}
.monthly-fill{height:100%;background:#0078d4;border-radius:4px;transition:width .3s}
.monthly-fill.near-budget{background:#f2c811}
.monthly-fill.over-budget{background:#d13438}
.card-meta{display:flex;justify-content:space-between;gap:8px;font-size:12px;color:#605e5c;margin-top:auto}
.empty-state{text-align:center;padding:58px 20px;color:#8a8886;font-size:15px;background:#fff;border-radius:8px}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-box{background:#fff;border-radius:10px;width:100%;max-width:860px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 18px 48px rgba(0,0,0,.24);overflow:hidden}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid #edebe9;background:#faf9f8;display:flex;justify-content:space-between;gap:16px}
.modal-id{font-size:13px;color:#8a8886;font-family:Consolas,'Yu Gothic UI',monospace;font-weight:700;margin-bottom:4px}
.modal-title{font-size:18px;font-weight:800;line-height:1.45}
.modal-close{border:none;background:transparent;color:#605e5c;font-size:22px;line-height:1;cursor:pointer;border-radius:4px;width:34px;height:34px}
.modal-close:hover{background:#edebe9}
.modal-body{padding:20px 24px;overflow:auto}
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.summary-tile{background:#f8f7f6;border:1px solid #edebe9;border-radius:8px;padding:12px 14px}
.summary-label{font-size:12px;color:#605e5c;margin-bottom:5px}
.summary-value{font-size:20px;font-weight:800;color:#201f1e}
.cost-table-wrap{overflow-x:auto;border:1px solid #e1dfdd;border-radius:8px}
.cost-table{border-collapse:collapse;width:100%;min-width:640px;font-size:13px;background:#fff}
.cost-table th{background:#f3f2f1;color:#605e5c;font-weight:800;text-align:left;padding:10px 12px;border-bottom:1px solid #ddd}
.cost-table td{padding:10px 12px;border-bottom:1px solid #edebe9}
.cost-table tr:last-child td{border-bottom:none}
.cost-table .num{text-align:right;font-variant-numeric:tabular-nums;font-weight:700}
.amount-input{width:150px;border:1px solid #c8c6c4;border-radius:5px;padding:7px 9px;text-align:right;font-variant-numeric:tabular-nums}
.amount-input:focus{outline:none;border-color:#0078d4;box-shadow:0 0 0 2px rgba(0,120,212,.14)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 24px;border-top:1px solid #edebe9;background:#faf9f8}
.import-log{margin-top:14px;background:#fff;border:1px solid #e1dfdd;border-radius:8px;padding:12px 14px;color:#605e5c;font-size:13px;line-height:1.6;max-height:150px;overflow:auto}
@media(max-width:820px){
  .app-header{padding:0 16px}
  .header-inner{height:auto;min-height:70px;padding:10px 0}
  .header-date{display:none}
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .stat-item:nth-child(2n){border-right:none}
  .app-main{padding:18px 14px 42px}
  .search-box{min-width:100%;max-width:100%}
  .toolbar-actions{justify-content:flex-start}
  .contract-import,.contract-url{width:100%;max-width:100%;min-width:0}
  .money-main{flex-direction:column}
  .money-right{text-align:left}
  .project-grid{grid-template-columns:1fr}
  .summary-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal"></div>

<script>
const STORAGE_KEY = 'labor_cost_dashboard_local'
const CONTRACT_URL_KEY = 'labor_cost_contract_source_url'
const OUTSOURCING_URL_KEY = 'labor_cost_outsourcing_source_url'
const API_URL = '/api/data'
const CONTRACT_API_URL = '/api/contracts'
const OUTSOURCING_API_URL = '/api/outsourcing'

const state = {
  projects: [],
  monthlyCosts: [],
  completedCosts: [],
  view: 'active',
  search: '',
  filter: 'all',
  sort: 'default',
  selectedNumber: null,
  selectedKind: null,
  showOutsourcingEditor: false,
  loading: true,
  saving: false,
  loadingContracts: false,
  loadingOutsourcing: false,
  contractUrl: localStorage.getItem(CONTRACT_URL_KEY) || '',
  outsourcingUrl: localStorage.getItem(OUTSOURCING_URL_KEY) || '',
  syncText: '読み込み中',
  log: [],
}

function parseCsv(text) {
  const rows = []
  let row = []
  let cell = ''
  let quoted = false
  const src = text.replace(/^\uFEFF/, '')
  for (let i = 0; i < src.length; i++) {
    const ch = src[i]
    const next = src[i + 1]
    if (quoted) {
      if (ch === '"' && next === '"') {
        cell += '"'
        i++
      } else if (ch === '"') {
        quoted = false
      } else {
        cell += ch
      }
    } else if (ch === '"') {
      quoted = true
    } else if (ch === ',') {
      row.push(cell)
      cell = ''
    } else if (ch === '\n') {
      row.push(cell)
      rows.push(row)
      row = []
      cell = ''
    } else if (ch !== '\r') {
      cell += ch
    }
  }
  row.push(cell)
  rows.push(row)
  return rows.filter(r => r.some(v => String(v).trim() !== ''))
}

async function readFile(file, markers = []) {
  const buffer = await file.arrayBuffer()
  const labels = ['utf-8', 'shift_jis']
  const candidates = labels.map(label => {
    try {
      const text = new TextDecoder(label).decode(buffer)
      const replacements = (text.match(/\uFFFD/g) || []).length
      const hits = markers.filter(marker => text.includes(marker)).length
      return { text, score: replacements * 10 - hits * 100 }
    } catch (error) {
      return null
    }
  }).filter(Boolean)
  candidates.sort((a, b) => a.score - b.score)
  return candidates[0]?.text || ''
}

function normalizeNumber(value) {
  return String(value || '').trim()
}

function normalizeHeader(value) {
  return String(value || '').trim().toLowerCase().replace(/[\s_-]+/g, '')
}

function findColumn(header, names) {
  const normalized = header.map(normalizeHeader)
  return names.map(normalizeHeader).reduce((found, name) => (
    found >= 0 ? found : normalized.indexOf(name)
  ), -1)
}

function parseAmount(value) {
  const cleaned = String(value || '').replace(/[,\s円]/g, '').trim()
  if (!cleaned || cleaned === '-' || cleaned === '－') return 0
  const n = Number(cleaned)
  return Number.isFinite(n) ? n : 0
}

function parseNullableAmount(value) {
  if (value === null || value === undefined || value === '') return null
  const n = typeof value === 'number' ? value : parseAmount(value)
  return Number.isFinite(n) ? n : null
}

function parseMonthFromName(name) {
  const match = String(name).match(/(20\d{2})[._-](\d{1,2})\.csv$/i)
  if (!match) return null
  return `${match[1]}-${match[2].padStart(2, '0')}`
}

function monthLabel(month) {
  if (!month) return ''
  const [year, m] = month.split('-')
  return `${year}年${Number(m)}月`
}

function formatMoney(value) {
  return Math.round(value || 0).toLocaleString('ja-JP')
}

function formatNullableMoney(value) {
  return typeof value === 'number' && Number.isFinite(value) ? `${formatMoney(value)}円` : '-'
}

function getOtherExpense(project) {
  return typeof project.contractAmount === 'number' && Number.isFinite(project.contractAmount)
    ? project.contractAmount * 0.2
    : null
}

function getSgaExpense(project) {
  return typeof project.contractAmount === 'number' && Number.isFinite(project.contractAmount)
    ? project.contractAmount * 0.24
    : null
}

function getOutsourcingAmount(project) {
  const manual = parseNullableAmount(project.manualOutsourcingAmount)
  return manual !== null ? manual : parseNullableAmount(project.outsourcingAmount)
}

function getBudget(project) {
  const contractAmount = parseNullableAmount(project.contractAmount)
  if (contractAmount === null) return null
  return contractAmount - (getOtherExpense(project) || 0) - (getOutsourcingAmount(project) || 0) - (getSgaExpense(project) || 0)
}

function getCompletedTotalCost(item) {
  return (item.materialCost || 0) + (item.laborCost || 0) + (item.outsourcingAmount || 0) +
    (item.expenses || 0) + (item.otherExpenses || 0) + (item.overheadCost || 0)
}

function getActiveNumbers() {
  return new Set(state.projects.map(project => project.number))
}

function getVisibleCompletedCosts() {
  const activeNumbers = getActiveNumbers()
  return state.completedCosts.filter(item => !activeNumbers.has(item.number))
}

function getDuplicateCompletedCount() {
  const activeNumbers = getActiveNumbers()
  return state.completedCosts.filter(item => activeNumbers.has(item.number)).length
}

function getSortedMonths() {
  return [...state.monthlyCosts].sort((a, b) => a.month.localeCompare(b.month))
}

function getProjectCosts(number) {
  return getSortedMonths().map(m => ({
    month: m.month,
    amount: Number(m.costsByNumber?.[number] || 0),
  }))
}

function getTotal(number) {
  return getProjectCosts(number).reduce((sum, item) => sum + item.amount, 0)
}

function getBudgetUsage(project) {
  const budget = getBudget(project)
  if (typeof budget !== 'number' || !Number.isFinite(budget)) return null
  if (budget <= 0) return getTotal(project.number) > 0 ? Infinity : 0
  return getTotal(project.number) / budget
}

function formatRate(value) {
  if (value === null || !Number.isFinite(value)) return '-'
  return `${Math.round(value * 1000) / 10}%`
}

function getDisplayBudgetUsage(project, total, budgetUsage) {
  const budget = getBudget(project)
  if (typeof budget !== 'number' || !Number.isFinite(budget)) return null
  if (budget < 0) return 1
  if (budget === 0) return total > 0 ? 1 : 0
  if (budgetUsage === null || !Number.isFinite(budgetUsage)) return null
  return Math.min(1, budgetUsage)
}

function getLatestCost(number) {
  const months = getSortedMonths()
  if (!months.length) return { month: null, amount: 0 }
  const latest = months[months.length - 1]
  return { month: latest.month, amount: Number(latest.costsByNumber?.[number] || 0) }
}

function getActiveStats() {
  const totals = state.projects.map(p => getTotal(p.number))
  const grandTotal = totals.reduce((a, b) => a + b, 0)
  const active = totals.filter(v => v > 0).length
  const noCost = totals.filter(v => v === 0).length
  return [
    ['対象業務', state.projects.length, ''],
    ['取込月数', state.monthlyCosts.length, 'stat-blue'],
    ['労務費あり', active, 'stat-green'],
    ['労務費なし', noCost, 'stat-gray'],
    ['合計労務費', formatMoney(grandTotal), 'stat-orange'],
  ]
}

function getCompletedStats() {
  const completed = getVisibleCompletedCosts()
  const duplicateCount = getDuplicateCompletedCount()
  const laborTotal = completed.reduce((sum, item) => sum + (item.laborCost || 0), 0)
  const totalCost = completed.reduce((sum, item) => sum + getCompletedTotalCost(item), 0)
  const withLabor = completed.filter(item => item.laborCost > 0).length
  return [
    ['完了済み', completed.length, ''],
    ['重複除外', duplicateCount, 'stat-gray'],
    ['労務費あり', withLabor, 'stat-green'],
    ['総原価', formatMoney(totalCost), 'stat-blue'],
    ['固定労務費', formatMoney(laborTotal), 'stat-orange'],
  ]
}

function addLog(message) {
  const time = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })
  state.log = [`${time} ${message}`, ...state.log].slice(0, 8)
}

function buildPayload() {
  return {
    projects: state.projects,
    monthlyCosts: state.monthlyCosts,
    completedCosts: state.completedCosts,
    updatedAt: new Date().toISOString(),
  }
}

function csvCell(value) {
  const text = value === null || value === undefined ? '' : String(value)
  return `"${text.replace(/"/g, '""')}"`
}

function downloadTextFile(filename, text, type = 'text/csv;charset=utf-8') {
  const blob = new Blob([text], { type })
  const url = URL.createObjectURL(blob)
  const link = document.createElement('a')
  link.href = url
  link.download = filename
  document.body.appendChild(link)
  link.click()
  link.remove()
  URL.revokeObjectURL(url)
}

function exportProjectsCsv() {
  if (state.view === 'completed') {
    exportCompletedCsv()
    return
  }
  const projects = getFilteredProjects()
  if (!projects.length) {
    addLog('出力できるデータがありません')
    render()
    return
  }

  const months = getSortedMonths()
  const header = [
    '業務番号',
    '業務名',
    '契約額',
    '外注費',
    'その他経費',
    '販管費',
    '予算',
    '労務費合計',
    '予算使用率',
    ...months.map(m => monthLabel(m.month)),
  ]
  const rows = projects.map(project => {
    const total = getTotal(project.number)
    const usage = getBudgetUsage(project)
    return [
      project.number,
      project.name,
      project.contractAmount ?? '',
      getOutsourcingAmount(project) ?? '',
      getOtherExpense(project) ?? '',
      getSgaExpense(project) ?? '',
      getBudget(project) ?? '',
      total,
      usage === null || !Number.isFinite(usage) ? '' : Math.round(usage * 1000) / 10,
      ...months.map(m => Number(m.costsByNumber?.[project.number] || 0)),
    ]
  })
  const csv = '\uFEFF' + [header, ...rows].map(row => row.map(csvCell).join(',')).join('\r\n')
  const date = new Date().toISOString().slice(0, 10).replace(/-/g, '')
  downloadTextFile(`labor-cost-active-${date}.csv`, csv)
  addLog(`${projects.length}件をCSV出力しました`)
  render()
}

function exportCompletedCsv() {
  const items = getFilteredCompletedCosts()
  if (!items.length) {
    addLog('出力できる完了済みデータがありません')
    render()
    return
  }
  const header = ['number', 'name', 'material cost', 'LaborCost', 'outsourcingAmount', 'expenses', 'otherexpenses', 'overheadCost', 'totalCost']
  const rows = items.map(item => [
    item.number,
    item.name,
    item.materialCost,
    item.laborCost,
    item.outsourcingAmount,
    item.expenses,
    item.otherExpenses,
    item.overheadCost,
    getCompletedTotalCost(item),
  ])
  const csv = '\uFEFF' + [header, ...rows].map(row => row.map(csvCell).join(',')).join('\r\n')
  const date = new Date().toISOString().slice(0, 10).replace(/-/g, '')
  downloadTextFile(`labor-cost-completed-${date}.csv`, csv)
  addLog(`完了済み${items.length}件をCSV出力しました`)
  render()
}

function loadLocalData() {
  try {
    const local = localStorage.getItem(STORAGE_KEY)
    if (!local) return null
    return sanitizeData(JSON.parse(local))
  } catch (error) {
    return null
  }
}

function saveLocalData() {
  const payload = buildPayload()
  localStorage.setItem(STORAGE_KEY, JSON.stringify(payload))
  state.syncText = `ローカル自動保存 ${new Date(payload.updatedAt).toLocaleString('ja-JP')}`
}

function sanitizeData(data) {
  const projects = Array.isArray(data.projects) ? data.projects : []
  const monthlyCosts = Array.isArray(data.monthlyCosts) ? data.monthlyCosts : []
  const completedCosts = Array.isArray(data.completedCosts) ? data.completedCosts : []
  return {
    projects: projects
      .map(p => ({
        number: normalizeNumber(p.number),
        name: String(p.name || '').trim(),
        contractAmount: parseNullableAmount(p.contractAmount),
        outsourcingAmount: parseNullableAmount(p.outsourcingAmount),
        manualOutsourcingAmount: parseNullableAmount(p.manualOutsourcingAmount),
      }))
      .filter(p => p.number && p.name),
    monthlyCosts: monthlyCosts
      .map(m => ({ month: String(m.month || ''), costsByNumber: m.costsByNumber || {} }))
      .filter(m => /^\d{4}-\d{2}$/.test(m.month)),
    completedCosts: completedCosts
      .map(item => ({
        number: normalizeNumber(item.number),
        name: String(item.name || '').trim(),
        materialCost: parseAmount(item.materialCost),
        laborCost: parseAmount(item.laborCost),
        outsourcingAmount: parseAmount(item.outsourcingAmount),
        expenses: parseAmount(item.expenses),
        otherExpenses: parseAmount(item.otherExpenses),
        overheadCost: parseAmount(item.overheadCost),
      }))
      .filter(item => item.number && item.name),
    updatedAt: data.updatedAt || null,
  }
}

async function loadData() {
  state.loading = true
  render()
  try {
    const response = await fetch(`${API_URL}?${Date.now()}`)
    if (!response.ok) throw new Error('remote unavailable')
    const data = sanitizeData(await response.json())
    const localData = !data.projects.length && !data.monthlyCosts.length && !data.completedCosts.length ? loadLocalData() : null
    state.projects = localData ? localData.projects : data.projects
    state.monthlyCosts = localData ? localData.monthlyCosts : data.monthlyCosts
    state.completedCosts = localData ? localData.completedCosts : data.completedCosts
    state.syncText = localData
      ? 'ローカルデータ'
      : data.updatedAt ? `保存済み ${new Date(data.updatedAt).toLocaleString('ja-JP')}` : '保存データなし'
  } catch (error) {
    const data = loadLocalData()
    if (data) {
      state.projects = data.projects
      state.monthlyCosts = data.monthlyCosts
      state.completedCosts = data.completedCosts
      state.syncText = 'ローカルデータ'
    } else {
      state.syncText = '保存データなし'
    }
  } finally {
    state.loading = false
    render()
  }
}

async function saveData() {
  state.saving = true
  render()
  const payload = buildPayload()
  localStorage.setItem(STORAGE_KEY, JSON.stringify(payload))
  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    })
    if (!response.ok) throw new Error(await response.text())
    const result = await response.json()
    const data = sanitizeData(result.data || payload)
    state.projects = data.projects
    state.monthlyCosts = data.monthlyCosts
    state.completedCosts = data.completedCosts
    state.syncText = `保存済み ${new Date(data.updatedAt || Date.now()).toLocaleString('ja-JP')}`
    addLog('Neonに保存しました')
  } catch (error) {
    state.syncText = 'ローカル保存'
    addLog('Neon保存に失敗したためローカルに保存しました')
  } finally {
    state.saving = false
    render()
  }
}

async function importProjects(event) {
  const file = event.target.files?.[0]
  event.target.value = ''
  if (!file) return
  try {
    const rows = parseCsv(await readFile(file, ['number', 'name']))
    const headerIndex = rows.findIndex(r => r.map(c => normalizeHeader(c)).includes('number'))
    if (headerIndex < 0) throw new Error('number列が見つかりません')
    const header = rows[headerIndex]
    const numberIndex = findColumn(header, ['number'])
    const nameIndex = findColumn(header, ['name'])
    if (numberIndex < 0 || nameIndex < 0) throw new Error('number,name列が必要です')
    const seen = new Set()
    const existingContracts = new Map(state.projects.map(p => [p.number, p.contractAmount ?? null]))
    const existingOutsourcing = new Map(state.projects.map(p => [p.number, p.outsourcingAmount ?? null]))
    const existingManualOutsourcing = new Map(state.projects.map(p => [p.number, p.manualOutsourcingAmount ?? null]))
    const projects = rows.slice(headerIndex + 1)
      .map(r => {
        const number = normalizeNumber(r[numberIndex])
        return {
          number,
          name: String(r[nameIndex] || '').trim(),
          contractAmount: existingContracts.has(number) ? existingContracts.get(number) : null,
          outsourcingAmount: existingOutsourcing.has(number) ? existingOutsourcing.get(number) : null,
          manualOutsourcingAmount: existingManualOutsourcing.has(number) ? existingManualOutsourcing.get(number) : null,
        }
      })
      .filter(p => p.number && p.name)
      .filter(p => {
        if (seen.has(p.number)) return false
        seen.add(p.number)
        return true
      })
    state.projects = projects
    saveLocalData()
    addLog(`対象業務を${projects.length}件読み込みました`)
    const duplicateCount = getDuplicateCompletedCount()
    if (duplicateCount) addLog(`完了済みと重複する${duplicateCount}件は進行中を優先します`)
    render()
  } catch (error) {
    addLog(`対象業務CSVの読込に失敗しました: ${error.message}`)
    render()
  }
}

async function importCompletedCosts(event) {
  const file = event.target.files?.[0]
  event.target.value = ''
  if (!file) return
  try {
    const rows = parseCsv(await readFile(file, ['number', 'name', 'LaborCost']))
    const headerIndex = rows.findIndex(r => r.map(c => normalizeHeader(c)).includes('number'))
    if (headerIndex < 0) throw new Error('number列が見つかりません')
    const header = rows[headerIndex]
    const numberIndex = findColumn(header, ['number'])
    const nameIndex = findColumn(header, ['name'])
    const laborIndex = findColumn(header, ['LaborCost', 'labor cost'])
    if (numberIndex < 0 || nameIndex < 0 || laborIndex < 0) {
      throw new Error('number,name,LaborCost列が必要です')
    }
    const materialIndex = findColumn(header, ['material cost', 'materialCost'])
    const outsourcingIndex = findColumn(header, ['outsourcingAmount', 'outsourcing amount'])
    const expensesIndex = findColumn(header, ['expenses'])
    const otherExpensesIndex = findColumn(header, ['otherexpenses', 'other expenses', 'otherExpenses'])
    const overheadIndex = findColumn(header, ['overheadCost', 'overhead cost'])
    const seen = new Set()
    const completedCosts = rows.slice(headerIndex + 1)
      .map(r => {
        const number = normalizeNumber(r[numberIndex])
        return {
          number,
          name: String(r[nameIndex] || '').trim(),
          materialCost: materialIndex >= 0 ? parseAmount(r[materialIndex]) : 0,
          laborCost: parseAmount(r[laborIndex]),
          outsourcingAmount: outsourcingIndex >= 0 ? parseAmount(r[outsourcingIndex]) : 0,
          expenses: expensesIndex >= 0 ? parseAmount(r[expensesIndex]) : 0,
          otherExpenses: otherExpensesIndex >= 0 ? parseAmount(r[otherExpensesIndex]) : 0,
          overheadCost: overheadIndex >= 0 ? parseAmount(r[overheadIndex]) : 0,
        }
      })
      .filter(item => item.number && item.name)
      .filter(item => {
        if (seen.has(item.number)) return false
        seen.add(item.number)
        return true
      })
    state.completedCosts = completedCosts
    saveLocalData()
    addLog(`完了済み業務を${completedCosts.length}件読み込みました`)
    const duplicateCount = getDuplicateCompletedCount()
    if (duplicateCount) addLog(`進行中と重複する${duplicateCount}件は完了済み一覧から除外します`)
    render()
  } catch (error) {
    addLog(`完了済みCSVの読込に失敗しました: ${error.message}`)
    render()
  }
}

async function importOutsourcing() {
  const sourceUrl = state.outsourcingUrl.trim()
  if (!sourceUrl) {
    addLog('外注管理アプリのURLを入力してください')
    render()
    return
  }
  if (!state.projects.length) {
    addLog('先に対象業務CSVを読み込んでください')
    render()
    return
  }

  state.loadingOutsourcing = true
  localStorage.setItem(OUTSOURCING_URL_KEY, sourceUrl)
  render()
  try {
    const response = await fetch(`${OUTSOURCING_API_URL}?url=${encodeURIComponent(sourceUrl)}`)
    const result = await response.json().catch(() => ({}))
    if (!response.ok) throw new Error(result.error || '外注費の読み込みに失敗しました')

    const outsourcing = Array.isArray(result.outsourcing) ? result.outsourcing : []
    const outsourcingMap = new Map(
      outsourcing
        .map(item => [normalizeNumber(item.number), parseNullableAmount(item.outsourcingAmount)])
        .filter(([number]) => number)
    )
    const targetNumbers = new Set(state.projects.map(p => p.number))
    let updated = 0
    let updatedWithAmount = 0
    state.projects = state.projects.map(project => {
      if (!outsourcingMap.has(project.number)) return project
      const outsourcingAmount = outsourcingMap.get(project.number)
      updated++
      if (typeof outsourcingAmount === 'number') updatedWithAmount++
      return { ...project, outsourcingAmount }
    })
    const onlyInOutsourcing = [...outsourcingMap.keys()].filter(number => !targetNumbers.has(number)).length
    saveLocalData()
    addLog(`外注費取得 ${outsourcingMap.size}件 / 一致 ${updated}件 / 表示対象 ${updatedWithAmount}件 / 対象外 ${onlyInOutsourcing}件`)
    if (updated === 0 && outsourcingMap.size > 0) {
      addLog('numberが一致しませんでした。対象業務CSVと外注管理アプリの業務番号を確認してください')
    }
  } catch (error) {
    addLog(`外注費の読み込みに失敗しました: ${error.message}`)
  } finally {
    state.loadingOutsourcing = false
    render()
  }
}

    const contracts = Array.isArray(result.contracts) ? result.contracts : []
    const contractMap = new Map(
      contracts

        .filter(([number]) => number)

async function importMonthly(event) {
  const files = [...(event.target.files || [])]
  event.target.value = ''
  if (!files.length) return
  for (const file of files) {
    try {
      const month = parseMonthFromName(file.name)
      if (!month) throw new Error('ファイル名はYYYY.MM.csvにしてください')
      const rows = parseCsv(await readFile(file, ['工番', '建コン合計']))
      const headerIndex = rows.findIndex(r => {
        const cells = r.map(c => c.trim())
        return cells.includes('工番') && cells.includes('建コン合計')
      })
      if (headerIndex < 0) throw new Error('工番・建コン合計の列が見つかりません')
      const header = rows[headerIndex].map(c => c.trim())
      const numberIndex = header.indexOf('工番')
      const totalIndex = header.indexOf('建コン合計')
      const targetNumbers = new Set(state.projects.map(p => p.number))
      const costsByNumber = {}
      rows.slice(headerIndex + 1).forEach(r => {
        const number = normalizeNumber(r[numberIndex])
        if (!number || !targetNumbers.has(number)) return
        costsByNumber[number] = parseAmount(r[totalIndex])
      })
      const existingIndex = state.monthlyCosts.findIndex(m => m.month === month)
      const item = { month, costsByNumber }
      if (existingIndex >= 0) state.monthlyCosts.splice(existingIndex, 1, item)
      else state.monthlyCosts.push(item)
      state.monthlyCosts.sort((a, b) => a.month.localeCompare(b.month))
      addLog(`${monthLabel(month)}を読み込みました (${Object.keys(costsByNumber).length}件)`)
    } catch (error) {
      addLog(`${file.name}: ${error.message}`)
    }
  }
  saveLocalData()
  render()
}

function getFilteredProjects() {
  const q = state.search.trim().toLowerCase()
  const filtered = state.projects.filter(p => {
    const total = getTotal(p.number)
    const latest = getLatestCost(p.number).amount
    const okFilter =
      state.filter === 'all' ||
      (state.filter === 'has-cost' && total > 0) ||
      (state.filter === 'latest' && latest > 0) ||
      (state.filter === 'no-cost' && total === 0)
    const okSearch = !q || p.number.toLowerCase().includes(q) || p.name.toLowerCase().includes(q)
    return okFilter && okSearch
  })
  if (state.sort === 'usage-desc') {
    return filtered.sort((a, b) => {
      const au = getBudgetUsage(a)
      const bu = getBudgetUsage(b)
      const av = au === null ? -1 : au
      const bv = bu === null ? -1 : bu
      if (bv !== av) return bv - av
      return a.number.localeCompare(b.number, 'ja')
    })
  }
  return filtered
}

function getFilteredCompletedCosts() {
  const q = state.search.trim().toLowerCase()
  const filtered = getVisibleCompletedCosts().filter(item => {
    const okFilter =
      state.filter === 'all' ||
      (state.filter === 'has-cost' && item.laborCost > 0) ||
      (state.filter === 'no-cost' && item.laborCost === 0)
    const okSearch = !q || item.number.toLowerCase().includes(q) || item.name.toLowerCase().includes(q)
    return okFilter && okSearch
  })
  if (state.sort === 'labor-desc') {
    return filtered.sort((a, b) => b.laborCost - a.laborCost || a.number.localeCompare(b.number, 'ja'))
  }
  return filtered
}

function renderNotice() {
  if (state.view === 'completed') {
    const duplicateCount = getDuplicateCompletedCount()
    if (duplicateCount) return `<div class="notice">進行中業務と重複する完了済み業務 ${duplicateCount}件は、進行中を優先して完了済み一覧から除外しています。</div>`
    if (!state.completedCosts.length) return '<div class="notice">完了済みCSVを読み込むと、固定の労務費が表示されます。</div>'
    return ''
  }
  return state.monthlyCosts.length === 0
    ? '<div class="notice">対象業務CSVと月次CSVを読み込むと、進行中業務の月次労務費が表示されます。</div>'
    : ''
}

function renderActiveContent(projects) {

  if (!projects.length) return '<div class="empty-state">条件に一致する進行中業務が見つかりません</div>'

      <h2 class="section-title"><span class="badge">進行中</span><span class="section-count">${projects.length}件</span></h2>

function renderCompletedContent(items) {

function renderActiveCard(project, maxTotal) {
  const total = getTotal(project.number)
  const latest = getLatestCost(project.number)
  const budget = getBudget(project)
  const budgetUsage = typeof budget === 'number' && Number.isFinite(budget) && budget > 0 ? total / budget : null
  const displayBudgetUsage = getDisplayBudgetUsage(project, total, budgetUsage)
  const overBudget = (typeof budget === 'number' && Number.isFinite(budget) && budget < 0) || (budgetUsage !== null && budgetUsage > 1)
  const nearBudget = budgetUsage !== null && budgetUsage >= 0.8 && budgetUsage <= 0.999
  const percent = typeof budget === 'number' && Number.isFinite(budget)
    ? budget > 0 ? Math.min(100, Math.max(2, Math.round((total / budget) * 100))) : 100
    : Math.max(2, Math.round((total / maxTotal) * 100))
  const barClass = overBudget ? 'over-budget' : nearBudget ? 'near-budget' : ''
  return `
    <article class="project-card" data-kind="active" data-number="${escapeAttr(project.number)}">
      <div class="card-header">
        <span class="badge">${escapeHtml(project.number)}</span>
        <span class="badge ${total > 0 ? 'badge-good' : 'badge-muted'}">${total > 0 ? '労務費あり' : '労務費なし'}</span>
      </div>
      <div class="card-name">${escapeHtml(project.name)}</div>
      <div class="money-main">
        <div class="money-left">
          <div class="money-block">
            <span class="money-value">${formatMoney(total)}</span>
            <span class="money-unit">円</span>
            <span class="labor-rate">${formatRate(displayBudgetUsage)}</span>
          </div>
          <div class="budget-inline">予算 <strong>${formatNullableMoney(budget)}</strong></div>
        </div>
        <div class="money-right">
          <div class="contract-line">契約額 <strong>${formatNullableMoney(project.contractAmount)}</strong></div>
          <div class="contract-line">外注費 <strong>${formatNullableMoney(getOutsourcingAmount(project))}</strong></div>
          <div class="contract-line">その他経費 <strong>${formatNullableMoney(getOtherExpense(project))}</strong></div>
          <div class="contract-line">販管費 <strong>${formatNullableMoney(getSgaExpense(project))}</strong></div>
        </div>
      </div>
      <div class="monthly-bar"><div class="monthly-fill ${barClass}" style="width:${percent}%"></div></div>
      <div class="card-meta">
        <span>${latest.month ? `${monthLabel(latest.month)}: ${formatMoney(latest.amount)}円` : '月次データなし'}</span>
        <span>${getProjectCosts(project.number).filter(v => v.amount > 0).length}ヶ月</span>
      </div>
    </article>
  `
}

function renderCompletedCard(item, maxLabor) {
  const percent = Math.max(2, Math.round((item.laborCost / maxLabor) * 100))
  return `
    <article class="project-card" data-kind="completed" data-number="${escapeAttr(item.number)}">
      <div class="card-header">
        <span class="badge">${escapeHtml(item.number)}</span>
        <span class="badge badge-fixed">完了済み</span>
      </div>
      <div class="card-name">${escapeHtml(item.name)}</div>
      <div class="money-main">
        <div class="money-left">
          <div class="money-block">
            <span class="money-value">${formatMoney(item.laborCost)}</span>
            <span class="money-unit">円</span>
          </div>
          <div class="budget-inline">総原価 <strong>${formatMoney(getCompletedTotalCost(item))}円</strong></div>
        </div>
        <div class="money-right">
          <div class="contract-line">材料費 <strong>${formatNullableMoney(item.materialCost)}</strong></div>
          <div class="contract-line">外注費 <strong>${formatNullableMoney(item.outsourcingAmount)}</strong></div>
          <div class="contract-line">経費 <strong>${formatNullableMoney(item.expenses)}</strong></div>
          <div class="contract-line">間接費 <strong>${formatNullableMoney(item.overheadCost)}</strong></div>
        </div>
      </div>
      <div class="monthly-bar"><div class="monthly-fill" style="width:${percent}%"></div></div>
      <div class="card-meta">
        <span>固定労務費</span>
        <span>変動なし</span>
      </div>
    </article>
  `
}

function renderModal() {
  const root = document.getElementById('modal')
  if (state.showOutsourcingEditor) {
    renderOutsourcingEditor(root)
    return
  }
  if (state.selectedKind === 'completed') {
    renderCompletedModal(root)
    return
  }
  renderActiveModal(root)
}

function renderActiveModal(root) {
  const project = state.projects.find(p => p.number === state.selectedNumber)
  if (!project) {
    root.innerHTML = ''
    return
  }
  const costs = getProjectCosts(project.number)
  const total = costs.reduce((sum, c) => sum + c.amount, 0)
  const nonZero = costs.filter(c => c.amount > 0)
  const latest = getLatestCost(project.number)
  const budget = getBudget(project)
  root.innerHTML = `
    <div class="modal-backdrop" id="modal-backdrop">
      <div class="modal-box">
        <div class="modal-header">
          <div>
            <div class="modal-id">${escapeHtml(project.number)}</div>
            <h2 class="modal-title">${escapeHtml(project.name)}</h2>
          </div>
          <button class="modal-close" id="modal-close" aria-label="閉じる">×</button>
        </div>
        <div class="modal-body">
          <div class="summary-row">
            <div class="summary-tile"><div class="summary-label">労務費合計</div><div class="summary-value">${formatMoney(total)}円</div></div>
            <div class="summary-tile"><div class="summary-label">契約額</div><div class="summary-value">${formatNullableMoney(project.contractAmount)}</div></div>
            <div class="summary-tile"><div class="summary-label">外注費</div><div class="summary-value">${formatNullableMoney(getOutsourcingAmount(project))}</div></div>
            <div class="summary-tile"><div class="summary-label">その他経費</div><div class="summary-value">${formatNullableMoney(getOtherExpense(project))}</div></div>
            <div class="summary-tile"><div class="summary-label">販管費</div><div class="summary-value">${formatNullableMoney(getSgaExpense(project))}</div></div>
            <div class="summary-tile"><div class="summary-label">予算</div><div class="summary-value">${formatNullableMoney(budget)}</div></div>
            <div class="summary-tile"><div class="summary-label">労務費あり</div><div class="summary-value">${nonZero.length}ヶ月</div></div>
            <div class="summary-tile"><div class="summary-label">最新月</div><div class="summary-value">${latest.month ? `${formatMoney(latest.amount)}円` : '-'}</div></div>
          </div>
          <div class="cost-table-wrap">
            <table class="cost-table">
              <thead><tr><th>対象月</th><th class="num">労務費</th></tr></thead>
              <tbody>
                ${costs.length ? costs.map(c => `<tr><td>${monthLabel(c.month)}</td><td class="num">${formatMoney(c.amount)}円</td></tr>`).join('') : '<tr><td colspan="2">月次データがありません</td></tr>'}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  `
  bindModalClose()
}

function renderCompletedModal(root) {
  const item = state.completedCosts.find(p => p.number === state.selectedNumber)
  if (!item || getActiveNumbers().has(item.number)) {
    root.innerHTML = ''
    return
  }
  root.innerHTML = `
    <div class="modal-backdrop" id="modal-backdrop">
      <div class="modal-box">
        <div class="modal-header">
          <div>
            <div class="modal-id">${escapeHtml(item.number)}</div>
            <h2 class="modal-title">${escapeHtml(item.name)}</h2>
          </div>
          <button class="modal-close" id="modal-close" aria-label="閉じる">×</button>
        </div>
        <div class="modal-body">
          <div class="summary-row">
            <div class="summary-tile"><div class="summary-label">固定労務費</div><div class="summary-value">${formatMoney(item.laborCost)}円</div></div>
            <div class="summary-tile"><div class="summary-label">総原価</div><div class="summary-value">${formatMoney(getCompletedTotalCost(item))}円</div></div>
            <div class="summary-tile"><div class="summary-label">状態</div><div class="summary-value">完了済み</div></div>
          </div>
          <div class="cost-table-wrap">
            <table class="cost-table">
              <thead><tr><th>費目</th><th class="num">金額</th></tr></thead>
              <tbody>
                <tr><td>材料費</td><td class="num">${formatMoney(item.materialCost)}円</td></tr>
                <tr><td>労務費</td><td class="num">${formatMoney(item.laborCost)}円</td></tr>
                <tr><td>外注費</td><td class="num">${formatMoney(item.outsourcingAmount)}円</td></tr>
                <tr><td>経費</td><td class="num">${formatMoney(item.expenses)}円</td></tr>
                <tr><td>その他経費</td><td class="num">${formatMoney(item.otherExpenses)}円</td></tr>
                <tr><td>間接費</td><td class="num">${formatMoney(item.overheadCost)}円</td></tr>
                <tr><td><strong>総原価</strong></td><td class="num"><strong>${formatMoney(getCompletedTotalCost(item))}円</strong></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  `
  bindModalClose()
}

function bindModalClose() {
  document.getElementById('modal-close').addEventListener('click', closeModal)
  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target.id === 'modal-backdrop') closeModal()
  })
}

function renderOutsourcingEditor(root) {
  const projects = [...state.projects].sort((a, b) => a.number.localeCompare(b.number, 'ja'))
  root.innerHTML = `
    <div class="modal-backdrop" id="outsourcing-backdrop">
      <div class="modal-box">
        <div class="modal-header">
          <div>
            <div class="modal-id">外注費</div>
            <h2 class="modal-title">外注費入力</h2>
          </div>
          <button class="modal-close" id="outsourcing-close" aria-label="閉じる">×</button>
        </div>
        <div class="modal-body">
          <div class="cost-table-wrap">
            <table class="cost-table">
              <thead><tr><th>業務番号</th><th>業務名</th><th class="num">読込値</th><th class="num">追加入力</th></tr></thead>
              <tbody>
                ${projects.length ? projects.map(project => `
                  <tr>
                    <td>${escapeHtml(project.number)}</td>
                    <td>${escapeHtml(project.name)}</td>
                    <td class="num">${formatNullableMoney(project.outsourcingAmount)}</td>
                    <td class="num">
                      <input class="amount-input" data-outsourcing-number="${escapeAttr(project.number)}" inputmode="numeric" value="${escapeAttr(project.manualOutsourcingAmount ?? '')}" placeholder="未入力" />
                    </td>
                  </tr>
                `).join('') : '<tr><td colspan="4">対象業務CSVを読み込んでください</td></tr>'}
              </tbody>
            </table>
          </div>
        </div>
        <div class="modal-footer">
          <button id="outsourcing-cancel" class="btn btn-secondary btn-small">キャンセル</button>
          <button id="outsourcing-save" class="btn btn-primary btn-small" ${projects.length ? '' : 'disabled'}>保存</button>
        </div>
      </div>
    </div>
  `
  document.getElementById('outsourcing-close').addEventListener('click', closeOutsourcingEditor)
  document.getElementById('outsourcing-cancel').addEventListener('click', closeOutsourcingEditor)
  document.getElementById('outsourcing-save').addEventListener('click', saveOutsourcingEditor)
  document.getElementById('outsourcing-backdrop').addEventListener('click', e => {
    if (e.target.id === 'outsourcing-backdrop') closeOutsourcingEditor()
  })
}

function openOutsourcingEditor() {
  state.showOutsourcingEditor = true
  state.selectedNumber = null
  state.selectedKind = null
  renderModal()
}

function closeOutsourcingEditor() {
  state.showOutsourcingEditor = false
  renderModal()
}

function saveOutsourcingEditor() {
  const updates = new Map()
  document.querySelectorAll('[data-outsourcing-number]').forEach(input => {
    updates.set(input.dataset.outsourcingNumber, parseNullableAmount(input.value))
  })
  state.projects = state.projects.map(project => (
    updates.has(project.number)
      ? { ...project, manualOutsourcingAmount: updates.get(project.number) }
      : project
  ))
  saveLocalData()
  addLog(`外注費を${updates.size}件保存しました`)
  state.showOutsourcingEditor = false
  render()
}

function closeModal() {
  state.selectedNumber = null
  state.selectedKind = null
  renderModal()
}

function setView(view) {
  state.view = view
  if (view === 'completed') {
    if (state.filter === 'latest') state.filter = 'all'
    if (state.sort === 'usage-desc') state.sort = 'default'
  } else if (state.sort === 'labor-desc') {
    state.sort = 'default'
  }
  state.selectedNumber = null
  state.selectedKind = null
  render()
}

function bindEvents() {
  document.querySelectorAll('[data-view]').forEach(btn => {
    btn.addEventListener('click', () => setView(btn.dataset.view))
  })
  document.querySelectorAll('[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.filter = btn.dataset.filter
      render()
    })
  })
  document.querySelectorAll('[data-sort]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.sort = btn.dataset.sort
      render()
    })
  })
  const search = document.getElementById('search-input')
  if (search) {
    search.addEventListener('input', e => {
      state.search = e.target.value
      render()
    })
  }
  const clear = document.getElementById('search-clear')
  if (clear) {
    clear.addEventListener('click', () => {
      state.search = ''
      render()
    })
  }
  document.getElementById('projects-input')?.addEventListener('change', importProjects)
  document.getElementById('monthly-input')?.addEventListener('change', importMonthly)
  document.getElementById('completed-input')?.addEventListener('change', importCompletedCosts)
  document.getElementById('save-btn')?.addEventListener('click', saveData)
  document.getElementById('export-btn')?.addEventListener('click', exportProjectsCsv)
  document.getElementById('contracts-btn')?.addEventListener('click', importContracts)
  document.getElementById('outsourcing-btn')?.addEventListener('click', importOutsourcing)
  document.getElementById('outsourcing-editor-btn')?.addEventListener('click', openOutsourcingEditor)
  document.getElementById('contract-url')?.addEventListener('input', e => {
    state.contractUrl = e.target.value
    localStorage.setItem(CONTRACT_URL_KEY, state.contractUrl)
  })
  document.getElementById('outsourcing-url')?.addEventListener('input', e => {
    state.outsourcingUrl = e.target.value
    localStorage.setItem(OUTSOURCING_URL_KEY, state.outsourcingUrl)
  })
  document.querySelectorAll('.project-card').forEach(card => {
    card.addEventListener('click', () => {
      state.selectedNumber = card.dataset.number
      state.selectedKind = card.dataset.kind
      renderModal()
    })
  })
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  }[ch]))
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/`/g, '&#96;')
}

loadData()
</script>
</body>
</html>
